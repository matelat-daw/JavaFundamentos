<tr>
    <td><img src="{{imagenSrc}}" class="img-thumbnail" style="width: 70px; height: 70px; object-fit: cover;"></td>
    <td><span class="badge bg-secondary">{{id}}</span></td>
    <td><strong>{{nombre}}</strong></td>
    <td><span class="badge bg-info">{{categoria}}</span></td>
    <td><span class="badge text-bg-light border">{{stock}}</span></td>
    <td><span class="badge {{activoBadgeClass}}">{{activoLabel}}</span></td>
    <td><strong class="text-success">€ {{precio}}</strong></td>
    <td>
        <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-sm btn-primary" onclick="navigate('detalle', {id: '{{id}}'})">👁️ Ver</button>
            <button class="btn btn-sm btn-warning" onclick="navigate('editar', {id: '{{id}}'})">✏️ Editar</button>
            <button class="btn btn-sm btn-danger" onclick="confirmarEliminacion('{{id}}', '{{nombreJs}}')">🗑️ Eliminar</button>
        </div>
    </td>
</tr>
