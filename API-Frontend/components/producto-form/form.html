<div class="container py-3 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="d-flex align-items-center mb-4">
                <button class="btn btn-outline-secondary me-3 d-none d-md-inline-block" onclick="navigate('catalogo')">←</button>
                <h1 class="mb-0 text-primary">{{titulo}}</h1>
            </div>
            <div class="card shadow-sm border-0">
                <div class="card-body p-3 p-md-4">
                    <form id="productForm">
                        <input type="hidden" name="id" value="{{id}}">
                        <input type="hidden" name="imagenActual" value="{{imagenActual}}">
                        <div class="row">
                            <div class="col-12 col-md-8">
                                <div class="mb-3">
                                    <label class="form-label">Nombre del Producto:</label>
                                    <input type="text" class="form-control" name="nombre" value="{{nombre}}" required minlength="2" maxlength="80">
                                </div>
                            </div>
                            <div class="col-12 col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Precio (€):</label>
                                    <input type="number" class="form-control" name="precio" value="{{precio}}" step="0.01" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12 col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Stock:</label>
                                    <input type="number" class="form-control" name="stock" value="{{stock}}" step="1" min="0" required>
                                </div>
                            </div>
                            <div class="col-12 col-md-4 d-flex align-items-end">
                                <div class="form-check form-switch mb-3">
                                    <input class="form-check-input" type="checkbox" role="switch" id="producto-activo" name="activo" {{activoChecked}}>
                                    <label class="form-check-label" for="producto-activo">Activo</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría:</label>
                            <select class="form-select" name="categoria" required>
                                {{opcionesCategorias}}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción:</label>
                            <textarea class="form-control" name="descripcion" rows="4" required>{{descripcion}}</textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Imagen del Producto:</label>
                            {{previewImagen}}
                            <input type="file" class="form-control" name="imagen" accept="image/*" {{fileRequired}}>
                        </div>
                        <div class="row g-2">
                            <div class="col-12 col-md-6 order-md-2">
                                <button type="submit" class="btn btn-success btn-lg w-100">✅ Guardar</button>
                            </div>
                            <div class="col-12 col-md-6 order-md-1">
                                <button type="button" class="btn btn-outline-secondary btn-lg w-100" onclick="navigate('catalogo')">Cancelar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
