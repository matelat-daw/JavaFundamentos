<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaFundamentos - Inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            margin: 10px 0;
            font-size: 1.1em;
        }
        
        .info-box {
            background-color: #f8f9fa;
            padding: 20px;
            border-left: 4px solid #667eea;
            margin-top: 30px;
            text-align: left;
        }
        
        .info-box strong {
            color: #667eea;
        }
        
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        a:hover {
            background-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 JavaFundamentos</h1>
        <p>¡Tu aplicación está ejecutándose en Tomcat!</p>
        
        <div class="info-box">
            <p><strong>🖥️ Servidor:</strong> Apache Tomcat 9.x</p>
            <p><strong>🌐 Puerto:</strong> 8080</p>
            <p><strong>☕ Java:</strong> 25.0.3</p>
            <p><strong>🗄️ Base de datos:</strong> Lista para conectar</p>
        </div>
        
        <a href="/test/">Acceder a la Aplicación</a>
    </div>
</body>
</html>
