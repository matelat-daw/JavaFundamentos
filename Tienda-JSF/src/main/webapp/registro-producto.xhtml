<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro de producto - Tienda Tech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</h:head>
<h:body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h1 class="card-title mb-0">Registro de producto</h1>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Completa los datos del producto y pulsa Guardar.</p>
                        
                        <h:form id="formProducto">
                            <!-- Campo: Nombre -->
                            <div class="mb-3">
                                <h:outputLabel for="nombre" value="Nombre del producto:" styleClass="form-label" />
                                <h:inputText id="nombre" value="#{productoBean.nombre}" required="true"
                                           requiredMessage="El nombre es obligatorio"
                                           styleClass="form-control" />
                                <h:message for="nombre" styleClass="text-danger small" />
                            </div>

                            <!-- Campo: Precio -->
                            <div class="mb-3">
                                <h:outputLabel for="precio" value="Precio:" styleClass="form-label" />
                                <h:inputText id="precio" value="#{productoBean.precio}" required="true"
                                           requiredMessage="El precio es obligatorio"
                                           validatorMessage="El precio debe ser mayor a 0,00"
                                           styleClass="form-control">
                                    <f:validateDoubleRange minimum="0.01" />
                                </h:inputText>
                                <h:message for="precio" styleClass="text-danger small" />
                            </div>

                            <!-- Campo: Categoría -->
                            <div class="mb-3">
                                <h:outputLabel for="categoria" value="Categoría:" styleClass="form-label" />
                                <h:selectOneMenu id="categoria" value="#{productoBean.categoria}" required="true"
                                               requiredMessage="La categoría es obligatoria"
                                               styleClass="form-select">
                                    <f:selectItem itemLabel="-- Selecciona una --" itemValue="" noSelectionOption="true" />
                                    <f:selectItem itemLabel="Periféricos" itemValue="Periféricos" />
                                    <f:selectItem itemLabel="Pantallas" itemValue="Pantallas" />
                                    <f:selectItem itemLabel="Audio" itemValue="Audio" />
                                    <f:selectItem itemLabel="Componentes" itemValue="Componentes" />
                                </h:selectOneMenu>
                                <h:message for="categoria" styleClass="text-danger small" />
                            </div>

                            <!-- Campo: Disponible -->
                            <div class="mb-3 form-check">
                                <h:selectBooleanCheckbox id="disponible" value="#{productoBean.disponible}"
                                                        styleClass="form-check-input" />
                                <h:outputLabel for="disponible" value="Disponible" styleClass="form-check-label" />
                            </div>

                            <!-- Botón de acción -->
                            <div class="d-grid gap-2">
                                <h:commandButton value="Guardar producto" action="#{productoBean.guardar}"
                                               styleClass="btn btn-primary btn-lg" />
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
