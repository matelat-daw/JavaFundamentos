<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Producto registrado - Tienda Tech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</h:head>
<h:body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="alert alert-success" role="alert">
                    <h1 class="alert-heading">¡Éxito!</h1>
                    <p>El producto ha sido registrado correctamente.</p>
                </div>

                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h2 class="card-title mb-0">Detalles del producto</h2>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <strong>Nombre:</strong>
                            </div>
                            <div class="col-sm-8">
                                <p class="text-muted">#{productoBean.nombre}</p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <strong>Precio:</strong>
                            </div>
                            <div class="col-sm-8">
                                <p class="text-muted">
                                    <span class="badge bg-info">$#{productoBean.precio}</span>
                                </p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <strong>Categoría:</strong>
                            </div>
                            <div class="col-sm-8">
                                <p class="text-muted">
                                    <span class="badge bg-secondary">#{productoBean.categoria}</span>
                                </p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <strong>Disponible:</strong>
                            </div>
                            <div class="col-sm-8">
                                <p class="text-muted">
                                    <h:outputText value="Sí" rendered="#{productoBean.disponible}" 
                                                 styleClass="badge bg-success" />
                                    <h:outputText value="No" rendered="#{not productoBean.disponible}" 
                                                 styleClass="badge bg-danger" />
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <h:link outcome="registro-producto" value="Registrar otro producto"
                          styleClass="btn btn-primary btn-lg" />
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
