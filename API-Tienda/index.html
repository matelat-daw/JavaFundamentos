<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Tienda Tech - SPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="./" onClick="event.preventDefault(); navigate('home')">
                <strong>🛍️ Tienda Tech</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="./" onclick="event.preventDefault(); navigate('home')">🏠 Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalogo" onclick="event.preventDefault(); navigate('catalogo')">📦 Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="resumen" onclick="event.preventDefault(); navigate('resumen')">📊 Resumen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contacto" onclick="event.preventDefault(); navigate('contacto')">📧 Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main id="app">
        <!-- Content will be injected here by app.js -->
        <div class="container text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer bg-light mt-auto py-4 border-top">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="text-muted">
                        <strong>🛍️ Tienda Tech</strong><br/>
                        Tienda de productos tecnológicos (SPA Version)
                    </p>
                </div>
                <div class="col-md-6 text-end">
                    <p class="text-muted">
                        <small>Frontend SPA | Backend API | MariaDB</small><br/>
                        <small>&copy; 2026 - Todos los derechos reservados</small>
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
