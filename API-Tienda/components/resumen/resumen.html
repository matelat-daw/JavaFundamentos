<div class="container py-5">
    <h1 class="mb-5 text-center text-primary">📊 Resumen de la Tienda</h1>
    <div class="row g-4">
        <div class="col-md-6 col-lg-4"><div class="card text-white bg-info"><div class="card-body text-center py-4"><h5>Total Productos</h5><p class="display-6 fw-bold">{{total}}</p></div></div></div>
        <div class="col-md-6 col-lg-4"><div class="card text-white bg-success"><div class="card-body text-center py-4"><h5>Categorías</h5><p class="display-6 fw-bold">{{categoriasCount}}</p></div></div></div>
        <div class="col-md-6 col-lg-4"><div class="card text-white bg-warning"><div class="card-body text-center py-4"><h5>Precio Promedio</h5><p class="display-6 fw-bold">$ {{avg}}</p></div></div></div>
        <div class="col-md-6 col-lg-4"><div class="card text-white bg-danger"><div class="card-body text-center py-4"><h5>Más Caro</h5><p class="display-6 fw-bold">$ {{max}}</p></div></div></div>
        <div class="col-md-6 col-lg-4"><div class="card text-white bg-secondary"><div class="card-body text-center py-4"><h5>Más Barato</h5><p class="display-6 fw-bold">$ {{min}}</p></div></div></div>
    </div>
</div>
