<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">
            <h1 class="mb-4 text-primary">📦 Catálogo de Productos</h1>
            <div class="mb-4 text-center text-md-start">
                <button class="btn btn-success" onclick="navigate('nuevo')">➕ Agregar Nuevo Producto</button>
            </div>
            <div class="mobile-cards">
                {{productsMobile}}
            </div>
            <div class="table-responsive desktop-table w-100">
                <table class="table table-hover align-middle border shadow-sm w-100">
                    <thead class="table-success">
                        <tr>
                            <th>Imagen</th>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{productsTable}}
                    </tbody>
                </table>
            </div>
            {{pagination}}
        </div>
    </div>
</div>
