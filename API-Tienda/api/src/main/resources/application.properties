spring.datasource.url=jdbc:mariadb://localhost:3306/techstore
spring.datasource.username=root
spring.datasource.password=Anubis@68
# spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Uploads (para WAR en Tomcat externo)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Static resources: include parent project folder so SPA files (index.html, js/, components/) are served
# Note: file:../ is relative to the 'api' module directory when running with mvn spring-boot:run
spring.web.resources.static-locations=file:../,classpath:/static/,file:./
