<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html">

<h:head>
    <title>TiendaTechJSF - Tienda Online</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</h:head>

<h:body class="d-flex align-items-center justify-content-center">
    <div class="text-center text-white" style="padding: 60px 20px;">
        <h1 class="display-3 fw-bold mb-3">🛒 TiendaTechJSF</h1>
        <p class="fs-5 mb-5">Aplicación de productos creada con JSF - JavaServer Faces</p>
        <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
            <h:link outcome="listado-productos" styleClass="btn btn-success btn-lg px-5 py-3 fw-semibold">
                <h:outputText value="📋 Ver Productos" />
            </h:link>
            <h:link outcome="alta-producto" styleClass="btn btn-primary btn-lg px-5 py-3 fw-semibold">
                <h:outputText value="➕ Registrar Productos" />
            </h:link>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</h:body>
</html>
