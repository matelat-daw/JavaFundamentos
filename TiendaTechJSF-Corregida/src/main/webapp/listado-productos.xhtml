<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
xmlns:h="jakarta.faces.html"
xmlns:f="jakarta.faces.core">

<h:head>
    <title>Listado de productos</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
        }
    </style>
</h:head>

<h:body class="bg-light py-5">
    <div class="container-lg">
        <div class="mb-4">
            <h1 class="text-primary fw-bold mb-3">📋 Listado de productos</h1>
            <div class="alert alert-info border-start border-4" role="alert">
                <strong>Total de productos:</strong> #{tiendaBean.productos.size()}
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
            <div class="table-responsive">
                <h:dataTable value="#{tiendaBean.productos}" var="p" styleClass="table table-hover mb-0">
                    <h:column>
                        <f:facet name="header">Nombre</f:facet>
                        <h:outputText value="#{p.nombre}" />
                    </h:column>

                    <h:column>
                        <f:facet name="header">Precio</f:facet>
                        <h:outputText value="#{p.precio}" />
                    </h:column>

                    <h:column>
                        <f:facet name="header">Categoría</f:facet>
                        <h:outputText value="#{p.categoria}" />
                    </h:column>

                    <h:column>
                        <f:facet name="header">Disponible</f:facet>
                        <h:outputText value="#{p.disponible ? '✅ Sí' : '❌ No'}" />
                    </h:column>
                </h:dataTable>
            </div>
        </div>

        <h:form>
            <div class="d-grid">
                <h:commandButton value="✅ Añadir otro producto" action="#{tiendaBean.volverAlFormulario}" styleClass="btn btn-success btn-lg fw-semibold" />
            </div>
        </h:form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</h:body>

</html>
