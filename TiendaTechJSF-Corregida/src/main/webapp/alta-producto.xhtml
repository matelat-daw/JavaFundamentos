<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
xmlns:h="jakarta.faces.html"
xmlns:f="jakarta.faces.core">

<h:head>
    <title>Alta de producto</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</h:head>

<h:body class="bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="text-primary fw-bold mb-3">⬆️ Alta de producto</h1>
                        <p class="text-muted mb-4">Introduce varios productos. Después aparecerán en el listado.</p>

                        <h:messages globalOnly="true" styleClass="alert alert-danger" />

                        <h:form>
                            <div class="mb-3">
                                <h:outputLabel for="nombre" value="Nombre del producto:" styleClass="form-label fw-semibold" />
                                <h:inputText id="nombre"
                                    value="#{tiendaBean.productoForm.nombre}"
                                    required="true"
                                    requiredMessage="El nombre es obligatorio."
                                    styleClass="form-control" />
                                <h:message for="nombre" styleClass="invalid-feedback d-block" />
                            </div>

                            <div class="mb-3">
                                <h:outputLabel for="precio" value="Precio:" styleClass="form-label fw-semibold" />
                                <h:inputText id="precio"
                                    value="#{tiendaBean.productoForm.precio}"
                                    required="true"
                                    requiredMessage="El precio es obligatorio"
                                    validatorMessage="El precio debe ser mayor a 0,00"
                                    styleClass="form-control">
                                    <f:validateDoubleRange minimum="0.01" />
                                </h:inputText>
                                <h:message for="precio" styleClass="invalid-feedback d-block" />
                            </div>

                            <div class="mb-3">
                                <h:outputLabel for="categoria" value="Categoría:" styleClass="form-label fw-semibold" />
                                <h:selectOneMenu id="categoria"
                                    value="#{tiendaBean.productoForm.categoria}"
                                    required="true"
                                    requiredMessage="La categoría es obligatoria."
                                    styleClass="form-select">
                                    <f:selectItem itemValue="" itemLabel="-- Selecciona una categoría --" />
                                    <f:selectItem itemValue="Periféricos" itemLabel="Periféricos" />
                                    <f:selectItem itemValue="Pantallas" itemLabel="Pantallas" />
                                    <f:selectItem itemValue="Audio" itemLabel="Audio" />
                                    <f:selectItem itemValue="Componentes" itemLabel="Componentes" />
                                </h:selectOneMenu>
                                <h:message for="categoria" styleClass="invalid-feedback d-block" />
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <h:selectBooleanCheckbox id="disponible"
                                        value="#{tiendaBean.productoForm.disponible}"
                                        styleClass="form-check-input" />
                                    <h:outputLabel for="disponible" value="Marcar si el producto está disponible" styleClass="form-check-label" />
                                </div>
                                <h:message for="disponible" styleClass="invalid-feedback d-block" />
                            </div>

                            <div class="d-grid gap-2">
                                <h:commandButton value="✅ Guardar producto"
                                    action="#{tiendaBean.guardarProducto}"
                                    styleClass="btn btn-success btn-lg fw-semibold" />
                            </div>

                            <div class="text-center mt-4">
                                <h:link outcome="listado-productos" styleClass="text-decoration-none link-primary">
                                    <h:outputText value="← Volver al listado" />
                                </h:link>
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</h:body>

</html>
