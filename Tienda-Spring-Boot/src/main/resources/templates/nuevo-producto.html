<head th:replace="~{fragments/head :: head('Nuevo Producto - Tienda Tech')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main>
        <div class="container py-3 py-md-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="d-flex align-items-center mb-4">
                        <a th:href="@{/tienda/catalogo}" class="btn btn-outline-secondary me-3 d-none d-md-inline-block">←</a>
                        <h1 class="mb-0 text-primary">➕ Nuevo Producto</h1>
                    </div>

                    <div class="card shadow-sm border-0">
                        <div class="card-body p-3 p-md-4">
                            <form th:action="@{/tienda/guardar}" method="POST" enctype="multipart/form-data">
                                <div class="row">
                                    <div class="col-12 col-md-8">
                                        <div class="mb-3">
                                            <label for="nombre" class="form-label">Nombre del Producto:</label>
                                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre descriptivo" required>
                                        </div>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <div class="mb-3">
                                            <label for="precio" class="form-label">Precio ($):</label>
                                            <input type="number" class="form-control" id="precio" name="precio" step="0.01" placeholder="0.00" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="categoria" class="form-label">Categoría:</label>
                                    <select class="form-select" id="categoria" name="categoria" required>
                                        <option value="" disabled selected>Selecciona una categoría</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"></option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="descripcion" class="form-label">Descripción:</label>
                                    <textarea class="form-control" id="descripcion" name="descripcion" rows="4" placeholder="Detalles del producto..." required></textarea>
                                </div>

                                <div class="mb-4">
                                    <label for="imagen" class="form-label">Imagen del Producto:</label>
                                    <div class="input-group">
                                        <input type="file" class="form-control" id="imagen" name="imagen" accept="image/*" required>
                                    </div>
                                    <small class="form-text text-muted">Formatos: JPG, PNG, WEBP (máx. 5MB)</small>
                                </div>

                                <div class="row g-2 mt-2">
                                    <div class="col-12 col-md-6 order-md-2">
                                        <button type="submit" class="btn btn-success btn-lg w-100">✅ Guardar Producto</button>
                                    </div>
                                    <div class="col-12 col-md-6 order-md-1">
                                        <a th:href="@{/tienda/catalogo}" class="btn btn-outline-secondary btn-lg w-100">Cancelar</a>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
