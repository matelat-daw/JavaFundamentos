<head th:replace="~{fragments/head :: head('Resumen - Tienda Tech')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main>
        <div class="container py-5">
            <h1 class="mb-5 text-center text-primary">📊 Resumen de la Tienda</h1>

            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <div class="card text-white bg-info">
                        <div class="card-body text-center py-5">
                            <h5 class="card-title">Total de Productos</h5>
                            <p class="card-text" style="font-size: 2.5rem; font-weight: bold;" th:text="${totalProductos}"></p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card text-white bg-success">
                        <div class="card-body text-center py-5">
                            <h5 class="card-title">Total de Categorías</h5>
                            <p class="card-text" style="font-size: 2.5rem; font-weight: bold;" th:text="${categorias.size()}"></p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card text-white bg-warning">
                        <div class="card-body text-center py-5">
                            <h5 class="card-title">Precio Promedio</h5>
                            <p class="card-text" style="font-size: 2.5rem; font-weight: bold;" th:text="'$' + ${precioPromedio}"></p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card text-white bg-danger">
                        <div class="card-body text-center py-5">
                            <h5 class="card-title">Producto Más Caro</h5>
                            <p class="card-text" style="font-size: 2.5rem; font-weight: bold;" th:text="'$' + ${precioMayor}"></p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card text-white bg-secondary">
                        <div class="card-body text-center py-5">
                            <h5 class="card-title">Producto Más Barato</h5>
                            <p class="card-text" style="font-size: 2.5rem; font-weight: bold;" th:text="'$' + ${precioMenor}"></p>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="mt-4 text-center text-md-start">
                <a th:href="@{/}" class="btn btn-outline-primary">← Volver al inicio</a>
            </nav>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
