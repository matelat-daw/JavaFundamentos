<head th:replace="~{fragments/head :: head('Editar Producto - Tienda Tech')}"></head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main>
        <div class="container py-3 py-md-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="d-flex align-items-center mb-4">
                        <a th:href="@{/store/detail/{id}(id=${producto.id})}" class="btn btn-outline-secondary me-3 d-none d-md-inline-block">←</a>
                        <h1 class="mb-0 text-primary">✏️ Editar Producto</h1>
                    </div>

                    <div class="card shadow-sm border-0">
                        <div class="card-body p-3 p-md-4">
                            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                                <strong>❌ Error:</strong> <span th:text="${error}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                            </div>

                            <form th:action="@{/store/update}" th:object="${producto}" method="POST" enctype="multipart/form-data">
                                <input type="hidden" th:field="*{id}">
                                
                                <div class="row">
                                    <div class="col-12 col-md-6">
                                        <div class="mb-3">
                                            <label for="nombre" class="form-label">Nombre del Producto:</label>
                                            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                                        </div>
                                    </div>
                                    <div class="col-12 col-md-3">
                                        <div class="mb-3">
                                            <label for="precio" class="form-label">Precio ($):</label>
                                            <input type="number" class="form-control" id="precio" th:field="*{precio}" th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid' : ''" step="0.01" min="0.01" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                                        </div>
                                    </div>
                                    <div class="col-12 col-md-3">
                                        <div class="mb-3">
                                            <label for="stock" class="form-label">Stock:</label>
                                            <input type="number" class="form-control" id="stock" th:field="*{stock}" th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid' : ''" step="1" min="0" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="categoria" class="form-label">Categoría:</label>
                                    <select class="form-select" id="categoria" th:field="*{categoria}" th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid' : ''" required>
                                        <option value="">Selecciona una categoría</option>
                                        <option th:each="cat : ${categorias}" 
                                                th:value="${cat}" 
                                                th:text="${cat}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="descripcion" class="form-label">Descripción:</label>
                                    <textarea class="form-control" id="descripcion" th:field="*{descripcion}" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''" rows="4" required></textarea>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                                </div>

                                <div class="mb-4">
                                    <label for="imagen" class="form-label">Imagen del Producto:</label>
                                    <div class="card bg-light mb-3 border-0" th:if="${producto.imagen}">
                                    <div class="card-body p-2 text-center">
                                        <img th:src="@{/imgs/} + ${producto.imagen}" class="img-thumbnail" style="max-height: 120px;" alt="Imagen actual">
                                        <p class="mb-0 mt-1 small text-muted">Imagen actual: <strong th:text="${producto.imagen}"></strong></p>
                                    </div>
                                </div>
                                    <input type="file" class="form-control" id="imagen" name="imagenFile" accept="image/*">
                                    <small class="form-text text-muted">Soportados: JPG, PNG, WEBP (máx. 5MB) - Dejar vacío para no cambiar</small>
                                </div>

                                <div class="row g-2 mt-2">
                                    <div class="col-12 col-md-6 order-md-2">
                                        <button type="submit" class="btn btn-warning btn-lg w-100">✏️ Actualizar Producto</button>
                                    </div>
                                    <div class="col-12 col-md-6 order-md-1">
                                        <a th:href="@{/store/detail/{id}(id=${producto.id})}" class="btn btn-outline-secondary btn-lg w-100">Cancelar</a>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
