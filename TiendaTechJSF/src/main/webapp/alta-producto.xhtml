<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
xmlns:h="jakarta.faces.html"
xmlns:f="jakarta.faces.core">

<h:head>
    <title>Alta de producto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            color: #718096;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        h:form {
            width: 100%;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .campo {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d3748;
            font-size: 1em;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #f7fafc;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
            margin-right: 10px;
            vertical-align: middle;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            padding: 12px;
            background-color: #f7fafc;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .checkbox-wrapper:hover {
            border-color: #667eea;
            background-color: #edf2f7;
        }

        .error {
            color: #e53e3e;
            font-size: 0.9em;
            margin-top: 6px;
            display: block;
        }

        .error-messages {
            background-color: #fed7d7;
            border-left: 4px solid #e53e3e;
            color: #742a2a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        button,
        input[type="submit"],
        .btn-guardar {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            color: white !important;
            border: none !important;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        button:hover,
        input[type="submit"]:hover,
        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6) !important;
        }

        button:active,
        input[type="submit"]:active,
        .btn-guardar:active {
            transform: translateY(0);
        }

        button:disabled,
        input[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        select {
            cursor: pointer;
            padding-right: 10px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
            appearance: none;
        }

        a {
            transition: all 0.3s ease;
        }

        a:hover {
            opacity: 0.8;
        }
    </style>
</h:head>

<h:body>

    <div class="form-container">
        <h1>Alta de producto</h1>
        <p>Introduce varios productos. Después aparecerán en el listado.</p>

        <h:messages globalOnly="true" styleClass="error-messages" />

    <h:form>

        <div class="campo">
            <h:outputLabel for="nombre" value="Nombre del producto:" />
            <h:inputText id="nombre"
            value="#{tiendaBean.nombre}"
            required="true"
            requiredMessage="El nombre es obligatorio." />
            <h:message for="nombre" styleClass="error" />
        </div>

        <div class="campo">
            <h:outputLabel for="precio" value="Precio:" />

            <!-- TODO 8:
 Crea un h:inputText conectado con tiendaBean.precio.
Debe ser obligatorio.
Añade f:validateDoubleRange con mínimo 0.01.
 -->
            <h:inputText id="precio" value="#{tiendaBean.precio}" required="true"
                requiredMessage="El precio es obligatorio"
                styleClass="form-control">
                <f:validateDoubleRange minimum="0.01" />
                </h:inputText>

            <h:message for="precio" styleClass="error" />
        </div>

        <div class="campo">
            <h:outputLabel for="categoria" value="Categoría:" />

            <!-- TODO 9:
 Crea un h:selectOneMenu conectado con tiendaBean.categoria.
 Debe tener estas opciones:
Periféricos, Pantallas, Audio, Componentes.
 -->
<h:selectOneMenu id="categoria" value="#{tiendaBean.categoria}" required="true" requiredMessage="La categoría es obligatoria.">
    <f:selectItem itemValue="" itemLabel="-- Selecciona una categoría --" />
    <f:selectItem itemValue="Periféricos" itemLabel="Periféricos" />
    <f:selectItem itemValue="Pantallas" itemLabel="Pantallas" />
    <f:selectItem itemValue="Audio" itemLabel="Audio" />
    <f:selectItem itemValue="Componentes" itemLabel="Componentes" />
</h:selectOneMenu>
        <h:message for="categoria" styleClass="error" />

        </div>

        <div class="campo">
            <h:outputLabel for="disponible" value="Disponible:" />

            <!-- TODO 10:
 Crea un h:selectBooleanCheckbox conectado con tiendaBean.disponible.
 -->
            <div class="checkbox-wrapper">
                <h:selectBooleanCheckbox id="disponible" value="#{tiendaBean.disponible}" />
                <label for="disponible" style="margin-bottom: 0; margin-left: 5px;">Marcar si el producto está disponible</label>
            </div>
            <h:message for="disponible" styleClass="error" />
        </div>

        <!-- TODO 11:
 Crea un h:commandButton con texto "Guardar producto".
 Debe llamar a tiendaBean.guardarProducto.
 -->
        <h:commandButton value="Guardar producto" action="#{tiendaBean.guardarProducto}" styleClass="btn-guardar" />

        <div style="text-align: center; margin-top: 20px;">
            <h:link outcome="listado-productos" value="← Volver al listado" style="color: #667eea; text-decoration: none; font-weight: 500; font-size: 1em;" />
        </div>

    </h:form>

    </div>

</h:body>

</html>
